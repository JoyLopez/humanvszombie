<!DOCTYPE html>
<html>
<head>
<title>Zombie Survival</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas{
    background:#222;
    border:3px solid white;
    display:block;
    margin:auto;
}

#info{
    font-size:20px;
    padding:10px;
}
</style>

</head>
<body>

<div id="info">
❤️ HP: <span id="hp">100</span>
&nbsp;
⭐ Score: <span id="score">0</span>
&nbsp;
🔫 Ammo: <span id="ammo">30</span>
</div>


<canvas id="game" width="900" height="600"></canvas>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");


let keys={};

let bullets=[];
let zombies=[];
let medkits=[];


let score=0;

let ammo=30;

let mouse={
x:450,
y:300
};



// PLAYER

let player={

x:450,
y:300,

speed:4,

hp:100

};





document.addEventListener("keydown",e=>{

keys[e.key.toLowerCase()]=true;


if(e.code=="Space")
shoot();


if(e.key.toLowerCase()=="r")
ammo=30;


});


document.addEventListener("keyup",e=>{

keys[e.key.toLowerCase()]=false;

});




canvas.addEventListener("mousemove",e=>{

let rect=canvas.getBoundingClientRect();

mouse.x=e.clientX-rect.left;
mouse.y=e.clientY-rect.top;

});





function shoot(){


if(ammo<=0)
return;


let angle=Math.atan2(

mouse.y-player.y,

mouse.x-player.x

);



bullets.push({

x:player.x,

y:player.y,

dx:Math.cos(angle)*10,

dy:Math.sin(angle)*10

});


ammo--;

}







function spawnZombie(){


let fast=Math.random()<0.25;


zombies.push({

x:Math.random()*900,

y:Math.random()*600,

speed:fast?2.5:1.2,

hp:fast?30:60,

color:fast?"orange":"green"

});


}



setInterval(spawnZombie,1200);





function spawnMedkit(){


medkits.push({

x:Math.random()*900,

y:Math.random()*600

});


}


setInterval(spawnMedkit,10000);







function movePlayer(){


if(keys["w"])
player.y-=player.speed;


if(keys["s"])
player.y+=player.speed;


if(keys["a"])
player.x-=player.speed;


if(keys["d"])
player.x+=player.speed;



player.x=Math.max(
0,
Math.min(900,player.x)
);


player.y=Math.max(
0,
Math.min(600,player.y)
);


}







function updateBullets(){


for(let i=bullets.length-1;i>=0;i--){


let b=bullets[i];


b.x+=b.dx;

b.y+=b.dy;



if(
b.x<0||
b.x>900||
b.y<0||
b.y>600
)

bullets.splice(i,1);



}


}







function updateZombies(){


for(let i=zombies.length-1;i>=0;i--){


let z=zombies[i];


let dx=player.x-z.x;

let dy=player.y-z.y;


let dist=Math.hypot(dx,dy);



z.x+=dx/dist*z.speed;

z.y+=dy/dist*z.speed;



if(dist<25){

player.hp-=0.4;

}




for(let j=bullets.length-1;j>=0;j--){


let b=bullets[j];


if(Math.hypot(
b.x-z.x,
b.y-z.y
)<20){


z.hp-=25;


bullets.splice(j,1);


}


}




if(z.hp<=0){


zombies.splice(i,1);

score+=10;


}



}



}







function updateMedkits(){


for(let i=medkits.length-1;i>=0;i--){


let m=medkits[i];


if(Math.hypot(
player.x-m.x,
player.y-m.y
)<25){


player.hp+=30;


if(player.hp>100)
player.hp=100;


medkits.splice(i,1);


}



}


}






function drawPlayer(){


// body

ctx.fillStyle="blue";

ctx.fillRect(
player.x-12,
player.y,
24,
35
);


// head

ctx.fillStyle="#ffcc99";

ctx.beginPath();

ctx.arc(
player.x,
player.y-12,
12,
0,
Math.PI*2
);

ctx.fill();


// gun

ctx.strokeStyle="black";

ctx.lineWidth=6;

ctx.beginPath();

ctx.moveTo(
player.x,
player.y+5
);

ctx.lineTo(
mouse.x,
mouse.y
);

ctx.stroke();



}







function drawZombies(){


zombies.forEach(z=>{


ctx.fillStyle=z.color;


ctx.fillRect(
z.x-15,
z.y,
30,
35
);



ctx.fillStyle="#99aa66";


ctx.beginPath();

ctx.arc(
z.x,
z.y-12,
14,
0,
Math.PI*2
);

ctx.fill();



});


}







function drawBullets(){


ctx.fillStyle="yellow";


bullets.forEach(b=>{


ctx.beginPath();

ctx.arc(
b.x,
b.y,
5,
0,
Math.PI*2
);

ctx.fill();


});


}






function drawMedkits(){


ctx.fillStyle="red";


medkits.forEach(m=>{


ctx.fillRect(
m.x-10,
m.y-10,
20,
20
);



ctx.fillStyle="white";

ctx.fillRect(
m.x-3,
m.y-8,
6,
16
);


ctx.fillStyle="red";


});


}







function update(){


movePlayer();

updateBullets();

updateZombies();

updateMedkits();



document.getElementById("hp").innerHTML=
Math.floor(player.hp);


document.getElementById("score").innerHTML=
score;


document.getElementById("ammo").innerHTML=
ammo;



if(player.hp<=0){

alert("GAME OVER");

location.reload();

}


}







function draw(){


ctx.clearRect(
0,
0,
900,
600
);


drawMedkits();

drawPlayer();

drawZombies();

drawBullets();


}







function loop(){

update();

draw();

requestAnimationFrame(loop);

}


loop();


</script>

</body>
</html>
