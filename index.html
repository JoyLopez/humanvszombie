<!DOCTYPE html>
<html>
<head>

<title>Zombie Survival Pro</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas{
    background:#222;
    border:3px solid white;
    display:block;
    margin:auto;
}

#info{
    font-size:20px;
    padding:10px;
}

</style>

</head>


<body>


<div id="info">

❤️ HP:
<span id="hp">100</span>

&nbsp;

⭐ Score:
<span id="score">0</span>

&nbsp;

🔫 Ammo:
<span id="ammo">12</span>

<br>

🌊 Wave:
<span id="wave">1</span>

&nbsp;

🧟 Zombies:
<span id="zombies">0</span>

&nbsp;

🔫 Weapon:
<span id="weapon">Pistol</span>

<br>

👹 Boss:
<span id="boss">None</span>

</div>


<canvas id="game" width="900" height="600"></canvas>



<script>


const canvas=document.getElementById("game");

const ctx=canvas.getContext("2d");



// =====================
// GAME DATA
// =====================


let keys={};


let bullets=[];

let zombies=[];

let medkits=[];

let buildings=[];


let score=0;

let wave=1;

let bossAlive=false;

let changingWave=false;

let gameOver=false;



let mouse={

x:450,

y:300

};





// =====================
// PLAYER
// =====================


let player={

x:450,

y:300,

speed:4,

hp:100

};







// =====================
// WEAPONS
// =====================


let weapons={


pistol:{

name:"Pistol",

damage:25,

ammo:12,

fireRate:300

},


shotgun:{

name:"Shotgun",

damage:15,

ammo:6,

fireRate:700

},


rifle:{

name:"Rifle",

damage:10,

ammo:30,

fireRate:100

}


};



let currentWeapon="pistol";

let ammo=12;

let lastShot=0;






// =====================
// SOUND
// =====================


let sounds={};



function loadSound(name,url){

sounds[name]=new Audio(url);

}



loadSound(
"shoot",
"https://actions.google.com/sounds/v1/weapons/gunshot.ogg"
);


loadSound(
"hit",
"https://actions.google.com/sounds/v1/impacts/crash.ogg"
);


loadSound(
"heal",
"https://actions.google.com/sounds/v1/cartoon/pop.ogg"
);





function playSound(name){

if(sounds[name]){

sounds[name].currentTime=0;

sounds[name].play().catch(()=>{});

}

}







// =====================
// CONTROLS
// =====================


document.addEventListener(
"keydown",
e=>{


keys[e.key.toLowerCase()]=true;



if(e.code=="Space"){

shoot();

}



if(e.key=="1"){

changeWeapon("pistol");

}


if(e.key=="2"){

changeWeapon("shotgun");

}


if(e.key=="3"){

changeWeapon("rifle");

}



if(e.key.toLowerCase()=="r"){

ammo=weapons[currentWeapon].ammo;

}



});





document.addEventListener(
"keyup",
e=>{


keys[e.key.toLowerCase()]=false;


});






canvas.addEventListener(
"mousemove",
e=>{


let rect=
canvas.getBoundingClientRect();


mouse.x=e.clientX-rect.left;

mouse.y=e.clientY-rect.top;


});





canvas.addEventListener(
"mousedown",
()=>{

shoot();

});








function changeWeapon(type){


currentWeapon=type;


ammo=weapons[type].ammo;


document.getElementById("weapon").innerHTML=
weapons[type].name;


}






// =====================
// SHOOT
// =====================


function shoot(){


let gun=
weapons[currentWeapon];


let now=Date.now();



if(now-lastShot < gun.fireRate)

return;



if(ammo<=0)

return;



lastShot=now;


ammo--;


playSound("shoot");



let angle=Math.atan2(

mouse.y-player.y,

mouse.x-player.x

);



if(currentWeapon=="shotgun"){


for(let i=0;i<5;i++){


let spread=
angle-0.25+
Math.random()*0.5;



bullets.push({

x:player.x,

y:player.y,

dx:Math.cos(spread)*10,

dy:Math.sin(spread)*10,

damage:gun.damage

});


}


}

else{


bullets.push({

x:player.x,

y:player.y,

dx:Math.cos(angle)*10,

dy:Math.sin(angle)*10,

damage:gun.damage

});


}



}
// =====================
// BUILDINGS
// =====================


buildings=[

{
x:120,
y:100,
w:150,
h:100
},

{
x:620,
y:120,
w:170,
h:120
},

{
x:330,
y:420,
w:220,
h:90
}

];






// =====================
// COLLISION
// =====================


function checkCollision(x,y,size){


for(let b of buildings){


if(

x+size > b.x &&

x-size < b.x+b.w &&

y+size > b.y &&

y-size < b.y+b.h

){

return true;

}


}


return false;

}








// =====================
// PLAYER MOVEMENT
// =====================


function movePlayer(){


let nx=player.x;

let ny=player.y;



if(keys["w"])

ny-=player.speed;



if(keys["s"])

ny+=player.speed;



if(keys["a"])

nx-=player.speed;



if(keys["d"])

nx+=player.speed;





if(!checkCollision(nx,player.y,20))

player.x=nx;



if(!checkCollision(player.x,ny,20))

player.y=ny;





player.x=Math.max(

0,

Math.min(900,player.x)

);



player.y=Math.max(

0,

Math.min(600,player.y)

);


}








// =====================
// WAVE SYSTEM
// =====================


function startWave(){


let amount=

5 + wave * 3;



for(let i=0;i<amount;i++){


spawnZombie();


}




if(wave % 5 == 0){


spawnBoss();


}



document.getElementById("wave").innerHTML=

wave;


}









// =====================
// NORMAL ZOMBIES
// =====================


function spawnZombie(){


let side=

Math.floor(Math.random()*4);



let x;

let y;



if(side==0){

x=0;

y=Math.random()*600;

}



if(side==1){

x=900;

y=Math.random()*600;

}



if(side==2){

x=Math.random()*900;

y=0;

}



if(side==3){

x=Math.random()*900;

y=600;

}





let fast=

Math.random()<0.25;





zombies.push({


type:

fast ?

"fast" :

"normal",



x:x,


y:y,



speed:

fast ?

2.5 :

1.2,



hp:

fast ?

50 :

100,



damage:

fast ?

0.8 :

0.4,



size:

25,



color:

fast ?

"orange" :

"green"


});



}









// =====================
// BOSS ZOMBIE
// =====================


function spawnBoss(){


bossAlive=true;



zombies.push({


type:"boss",


x:450,


y:50,


speed:0.8,


hp:1500,


damage:1.5,


size:70,


color:"purple"


});




document.getElementById("boss").innerHTML=

"ACTIVE";



}









// =====================
// ZOMBIE MOVEMENT
// =====================


function moveZombies(){



for(let z of zombies){



let dx=

player.x-z.x;



let dy=

player.y-z.y;



let distance=

Math.hypot(dx,dy);



if(distance==0)

continue;





let nx=

z.x+(dx/distance)*z.speed;



let ny=

z.y+(dy/distance)*z.speed;





if(!checkCollision(nx,ny,z.size)){


z.x=nx;

z.y=ny;


}




if(distance<z.size){


player.hp-=z.damage;


}



}



}








// =====================
// START GAME
// =====================


startWave();
// =====================
// BULLET UPDATE
// =====================


function updateBullets(){


for(let i=bullets.length-1;i>=0;i--){


let b=bullets[i];



b.x+=b.dx;

b.y+=b.dy;





// bullet hits wall

if(checkCollision(b.x,b.y,5)){


bullets.splice(i,1);

continue;


}





// remove outside screen

if(

b.x<0 ||

b.x>900 ||

b.y<0 ||

b.y>600

){


bullets.splice(i,1);

continue;


}







// zombie hit

for(let j=zombies.length-1;j>=0;j--){



let z=zombies[j];



if(

Math.hypot(

b.x-z.x,

b.y-z.y

)

<z.size

){



z.hp-=b.damage;



bullets.splice(i,1);



playSound("hit");





if(z.hp<=0){



if(z.type=="boss"){


score+=500;


bossAlive=false;


document.getElementById("boss").innerHTML=
"None";


}

else{


score+=10;


}



zombies.splice(j,1);



}



break;



}



}



}



}









// =====================
// HEALTH PACKS
// =====================


function spawnMedkit(){


medkits.push({


x:Math.random()*900,


y:Math.random()*600


});


}



setInterval(

spawnMedkit,

10000

);






function updateMedkits(){



for(let i=medkits.length-1;i>=0;i--){



let m=medkits[i];



if(

Math.hypot(

player.x-m.x,

player.y-m.y

)<30

){



player.hp+=40;



if(player.hp>100)

player.hp=100;



playSound("heal");



medkits.splice(i,1);



}



}



}










// =====================
// DRAW BUILDINGS
// =====================


function drawBuildings(){



for(let b of buildings){



ctx.fillStyle="#555";



ctx.fillRect(

b.x,

b.y,

b.w,

b.h

);




ctx.strokeStyle="#aaa";



ctx.strokeRect(

b.x,

b.y,

b.w,

b.h

);



}



}










// =====================
// DRAW PLAYER
// =====================


function drawPlayer(){



// body


ctx.fillStyle="blue";


ctx.fillRect(

player.x-12,

player.y,

24,

35

);




// head


ctx.fillStyle="#ffcc99";


ctx.beginPath();


ctx.arc(

player.x,

player.y-12,

12,

0,

Math.PI*2

);


ctx.fill();





// gun


ctx.strokeStyle="black";

ctx.lineWidth=6;



ctx.beginPath();



ctx.moveTo(

player.x,

player.y+10

);



ctx.lineTo(

mouse.x,

mouse.y

);



ctx.stroke();



}










// =====================
// DRAW ZOMBIES
// =====================


function drawZombies(){



for(let z of zombies){



ctx.fillStyle=z.color;



ctx.fillRect(

z.x-z.size/2,

z.y,

z.size,

z.size+20

);




// head


ctx.beginPath();



ctx.arc(

z.x,

z.y-10,

z.size/2,

0,

Math.PI*2

);



ctx.fill();





// health bar background


ctx.fillStyle="red";


ctx.fillRect(

z.x-30,

z.y-z.size-25,

60,

6

);





let maxHP;



if(z.type=="boss")

maxHP=1500;

else if(z.type=="fast")

maxHP=50;

else

maxHP=100;





ctx.fillStyle="lime";


ctx.fillRect(

z.x-30,

z.y-z.size-25,

60*(z.hp/maxHP),

6

);



}



}










// =====================
// DRAW MEDKITS
// =====================


function drawMedkits(){



for(let m of medkits){



ctx.fillStyle="red";



ctx.fillRect(

m.x-10,

m.y-10,

20,

20

);



ctx.fillStyle="white";



ctx.fillRect(

m.x-3,

m.y-8,

6,

16

);



}



}










// =====================
// DRAW BULLETS
// =====================


function drawBullets(){



ctx.fillStyle="yellow";



for(let b of bullets){



ctx.beginPath();



ctx.arc(

b.x,

b.y,

5,

0,

Math.PI*2

);



ctx.fill();



}

}










// =====================
// BOSS HEALTH BAR
// =====================


function drawBossBar(){



let boss=

zombies.find(

z=>z.type=="boss"

);





if(boss){



ctx.fillStyle="red";


ctx.fillRect(

200,

20,

500,

20

);



ctx.fillStyle="purple";


ctx.fillRect(

200,

20,

500*(boss.hp/1500),

20

);



ctx.fillStyle="white";


ctx.font="18px Arial";


ctx.fillText(

"BOSS",

430,

35

);



}



}
// =====================
// UPDATE WAVE
// =====================


function updateWave(){


if(

zombies.length==0 &&

!bossAlive &&

!changingWave

){


changingWave=true;


wave++;


setTimeout(()=>{


startWave();


changingWave=false;


},3000);



}



}









// =====================
// UPDATE UI
// =====================


function updateUI(){


document.getElementById("hp").innerHTML=

Math.floor(player.hp);



document.getElementById("score").innerHTML=

score;



document.getElementById("ammo").innerHTML=

ammo;



document.getElementById("zombies").innerHTML=

zombies.length;



}









// =====================
// GAME UPDATE
// =====================


function update(){

    if(gameOver){
        return;
    }

    movePlayer();
    updateBullets();
    moveZombies();
    updateMedkits();
    updateWave();
    updateUI();

    if(player.hp <= 0 && !gameOver){

        gameOver = true;

        setTimeout(()=>{

            alert("GAME OVER\nScore: " + score);

            resetGame();

        },200);
    }

} 


// =====================
// DRAW EVERYTHING
// =====================


function draw(){

    ctx.clearRect(0,0,900,600);

    ctx.fillStyle="#333";
    ctx.fillRect(0,0,900,600);

    drawBuildings();
    drawMedkits();
    drawPlayer();
    drawZombies();
    drawBullets();
    drawBossBar();
}
    
// =====================
// RESET GAME
// =====================
function resetGame(){

    player.x=450;
    player.y=300;
    player.hp=100;


    score=0;
    wave=1;


    ammo=weapons[currentWeapon].ammo;


    bullets=[];

    zombies=[];

    medkits=[];


    bossAlive=false;

    changingWave=false;


    gameOver=false;


    document.getElementById("boss").innerHTML="None";


    document.getElementById("weapon").innerHTML=
    weapons[currentWeapon].name;


    startWave();

}



// =====================
// GAME LOOP
// =====================


function gameLoop(){

update();

draw();

requestAnimationFrame(gameLoop);

}
// Start the game
gameLoop();

</script>

</body>
</html>
